<!DOCTYPE html>
<!-- 
    Page d'inscription - CityFix
    Description : Formulaire de création de compte utilisateur moderne
-->
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - CityFix</title>
    <meta name="description" content="Créez votre compte CityFix">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cpath fill='%233A86FF' d='M12 2C8.68629 2 6 4.68629 6 8C6 12.5 12 22 12 22C12 22 18 12.5 18 8C18 4.68629 15.3137 2 12 2Z'/%3E%3C/svg%3E">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap');

        :root {
            --color-primary: #3A86FF;
            --color-primary-dark: #2563eb;
            --color-primary-light: #60a5fa;
            --color-success: #06D6A0;
            --color-white: #FFFFFF;
            --color-dark: #1e293b;
            --color-dark-secondary: #475569;
            --color-light: #f8fafc;
            --color-light-secondary: #e2e8f0;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.1);
            --radius-sm: 0.375rem;
            --radius-md: 0.5rem;
            --radius-lg: 0.75rem;
            --radius-xl: 1rem;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', 'Inter', sans-serif;
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .signup-container {
            width: 100%;
            max-width: 440px;
        }

        .signup-card {
            background: var(--color-white);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-xl);
            padding: 2.5rem;
            animation: fadeInUp 0.5s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .signup-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo {
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
            margin-bottom: 1.5rem;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-light) 100%);
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow-md);
        }

        .logo-icon svg {
            width: 28px;
            height: 28px;
        }

        .logo-text {
            font-size: 1.75rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--color-primary) 0%, #1d4ed8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .signup-header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--color-dark);
            margin-bottom: 0.5rem;
        }

        .signup-header p {
            color: var(--color-dark-secondary);
            font-size: 0.9rem;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: var(--color-dark);
            font-size: 0.9rem;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper svg {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            height: 20px;
            color: var(--color-dark-secondary);
            transition: var(--transition);
        }

        .form-group input, 
        .form-group select {
            width: 100%;
            padding: 0.875rem 1rem;
            border: 2px solid var(--color-light-secondary);
            border-radius: var(--radius-lg);
            font-size: 1rem;
            font-family: inherit;
            transition: var(--transition);
            background: var(--color-light);
            cursor: pointer;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--color-primary);
            background: var(--color-white);
            box-shadow: 0 0 0 3px rgba(58, 134, 255, 0.1);
        }

        #codeAdminGroup {
            padding: 1rem;
            background: rgba(58, 134, 255, 0.05);
            border-radius: var(--radius-lg);
            border: 1px solid rgba(58, 134, 255, 0.2);
        }

        .btn-submit {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-dark) 100%);
            color: var(--color-white);
            border: none;
            border-radius: var(--radius-lg);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 0.5rem;
            box-shadow: 0 4px 14px 0 rgba(58, 134, 255, 0.3);
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(58, 134, 255, 0.4);
        }

        .success-message {
            background: rgba(6, 214, 160, 0.1);
            color: #059669;
            padding: 0.75rem 1rem;
            border-radius: var(--radius-md);
            font-size: 0.875rem;
            margin-bottom: 1rem;
            display: none;
            text-align: center;
        }

        .error-message {
            background: rgba(255, 77, 77, 0.1);
            color: #dc2626;
            padding: 0.75rem 1rem;
            border-radius: var(--radius-md);
            font-size: 0.875rem;
            margin-bottom: 1rem;
            display: none;
            animation: shake 0.5s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .login-link {
            text-align: center;
            color: var(--color-dark-secondary);
            font-size: 0.9rem;
        }

        .login-link a {
            color: var(--color-primary);
            font-weight: 600;
            text-decoration: none;
            transition: var(--transition);
        }

        .login-link a:hover {
            color: var(--color-primary-dark);
            text-decoration: underline;
        }

        .back-home {
            text-align: center;
            margin-top: 1.5rem;
        }

        .back-home a {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--color-dark-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            transition: var(--transition);
        }

        .back-home a:hover {
            color: var(--color-primary);
        }

        @media (max-width: 480px) {
            .signup-card {
                padding: 1.5rem;
            }
            
            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <div class="signup-container">
        <div class="signup-card">
            <div class="signup-header">
                <a href="index.html" class="logo">
                    <div class="logo-icon">
                        <svg viewBox="0 0 24 24" fill="white">
                            <path d="M12 2C8.68629 2 6 4.68629 6 8C6 12.5 12 22 12 22C12 22 18 12.5 18 8C18 4.68629 15.3137 2 12 2Z"/>
                        </svg>
                    </div>
                    <span class="logo-text">CityFix</span>
                </a>
                <h1>Créer un compte</h1>
                <p>Rejoignez-nous pour améliorer votre ville</p>
            </div>

            <div class="success-message" id="successMessage">Inscription réussie ! Vous pouvez maintenant vous connecter.</div>
            <div class="error-message" id="errorMessage"></div>

            <form id="inscriptionForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="prenom">Prénom</label>
                        <div class="input-wrapper">
                            <input type="text" id="prenom" name="prenom" placeholder="John" required>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                                <circle cx="12" cy="7" r="4"/>
                            </svg>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="nom">Nom</label>
                        <div class="input-wrapper">
                            <input type="text" id="nom" name="nom" placeholder="Doe" required>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                                <circle cx="12" cy="7" r="4"/>
                            </svg>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="email">Adresse email</label>
                    <div class="input-wrapper">
                        <input type="email" id="email" name="email" placeholder="vous@exemple.com" required>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                            <path d="M22 6l-10 7L2 6"/>
                        </svg>
                    </div>
                </div>

                <div class="form-group">
                    <label for="motDePasse">Mot de passe</label>
                    <div class="input-wrapper">
                        <input type="password" id="motDePasse" name="motDePasse" placeholder="••••••••" required>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                    </div>
                </div>

                <div class="form-group">
                    <label for="typeCompte">Type de compte</label>
                    <select id="typeCompte" name="typeCompte" required>
                        <option value="UTILISATEUR">Utilisateur</option>
                        <option value="ADMIN">Administrateur</option>
                    </select>
                </div>

                <div class="form-group" id="codeAdminGroup" style="display: none;">
                    <label for="codeAdmin">Code administrateur</label>
                    <div class="input-wrapper">
                        <input type="password" id="codeAdmin" name="codeAdmin" placeholder="Entrez le code secret">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 15v2m-6 4h12a2 2 0 0 0 2-2v-6a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2zm10-10V7a4 4 0 0 0-8 0v4h8z"/>
                        </svg>
                    </div>
                    <small style="color: var(--color-dark-secondary); font-size: 0.8rem;">Ce code est requis pour créer un compte administrateur</small>
                </div>

                <button type="submit" class="btn-submit">Créer mon compte</button>
            </form>

            <p class="login-link">
                Déjà un compte ? <a href="connexion.html">Se connecter</a>
            </p>

<div class="back-home">
                <a href="informations.html">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 4v16m8-8H4"/>
                    </svg>
                    📋 Informations utiles
                </a>
                <a href="index.html">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M19 12H5M12 19l-7-7 7-7"/>
                    </svg>
                    Retour à l'accueil
                </a>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('inscriptionForm');
            const successMessage = document.getElementById('successMessage');
            const errorMessage = document.getElementById('errorMessage');
            const typeCompte = document.getElementById('typeCompte');
            const codeAdminGroup = document.getElementById('codeAdminGroup');
            const API_URL = '/api/utilisateurs';

            // Code administrateur par défaut 
            const CODE_ADMIN_SECRET = 'admin123';

            // Afficher/masquer le champ code admin selon le type de compte
            typeCompte.addEventListener('change', () => {
                if (typeCompte.value === 'ADMIN') {
                    codeAdminGroup.style.display = 'block';
                    document.getElementById('codeAdmin').required = true;
                } else {
                    codeAdminGroup.style.display = 'none';
                    document.getElementById('codeAdmin').required = false;
                    document.getElementById('codeAdmin').value = '';
                }
            });

            form.addEventListener('submit', async (e) => {
                e.preventDefault();

                const prenom = document.getElementById('prenom').value;
                const nom = document.getElementById('nom').value;
                const email = document.getElementById('email').value;
                const motDePasse = document.getElementById('motDePasse').value;
                const role = typeCompte.value;
                const codeAdmin = document.getElementById('codeAdmin').value;

                // Vérification du code admin si création de compte admin
                if (role === 'ADMIN' && codeAdmin !== CODE_ADMIN_SECRET) {
                    errorMessage.textContent = 'Code administrateur incorrect';
                    errorMessage.style.display = 'block';
                    successMessage.style.display = 'none';
                    return;
                }

                try {
                    const response = await fetch(`${API_URL}/inscription`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
body: JSON.stringify({ 
                            prenom, 
                            nom, 
                            email, 
                            motDePasse,
                            role: role === 'UTILISATEUR' ? 'USER' : 'ADMIN'
                        })
                    });

                    if (response.ok) {
                        form.reset();
                        successMessage.style.display = 'block';
                        errorMessage.style.display = 'none';
                        setTimeout(() => {
                            window.location.href = 'connexion.html';
                        }, 2000);
                    } else {
                        const errorText = await response.text();
                        errorMessage.textContent = errorText || 'Erreur lors de l\'inscription.';
                        errorMessage.style.display = 'block';
                        successMessage.style.display = 'none';
                    }
                } catch (error) {
                    console.error('Erreur:', error);
                    errorMessage.textContent = 'Erreur de connexion. Veuillez réessayer.';
                    errorMessage.style.display = 'block';
                    successMessage.style.display = 'none';
                }
            });
        });
    </script>
</body>
</html>
