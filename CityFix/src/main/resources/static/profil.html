<!DOCTYPE html>
<!-- 
    Page Profil Utilisateur - CityFix
    Description : Affiche le profil de l'utilisateur avec ses informations et statistiques
-->
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Profil - CityFix</title>
    <meta name="description" content="Mon profil CityFix">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cpath fill='%233A86FF' d='M12 2C8.68629 2 6 4.68629 6 8C6 12.5 12 22 12 22C12 22 18 12.5 18 8C18 4.68629 15.3137 2 12 2Z'/%3E%3C/svg%3E">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap');

        :root {
            --color-primary: #3A86FF;
            --color-primary-dark: #2563eb;
            --color-primary-light: #60a5fa;
            --color-success: #06D6A0;
            --color-warning: #FFA500;
            --color-danger: #FF4D4D;
            --color-white: #FFFFFF;
            --color-dark: #1e293b;
            --color-dark-secondary: #475569;
            --color-light: #f8fafc;
            --color-light-secondary: #e2e8f0;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            --radius-sm: 0.375rem;
            --radius-md: 0.5rem;
            --radius-lg: 0.75rem;
            --radius-xl: 1rem;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', 'Inter', sans-serif;
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
            color: var(--color-dark);
            min-height: 100vh;
            line-height: 1.6;
        }

        /* Navigation */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow-sm);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-light) 100%);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-icon svg {
            width: 20px;
            height: 20px;
        }

        .logo-text {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--color-primary);
        }

        .nav-links {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .nav-link {
            text-decoration: none;
            color: var(--color-dark-secondary);
            font-weight: 500;
            transition: var(--transition);
        }

        .nav-link:hover {
            color: var(--color-primary);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1.25rem;
            border-radius: var(--radius-lg);
            font-weight: 600;
            text-decoration: none;
            transition: var(--transition);
            font-size: 0.9rem;
            cursor: pointer;
            border: none;
        }

        .btn-secondary {
            background: var(--color-light);
            color: var(--color-dark-secondary);
        }

        .btn-secondary:hover {
            background: var(--color-light-secondary);
        }

        .btn-danger {
            background: var(--color-danger);
            color: var(--color-white);
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        /* Main content */
        .container {
            max-width: 1000px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }

        /* Profile card */
        .profile-card {
            background: var(--color-white);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            animation: fadeInUp 0.5s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .profile-header {
            background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-dark) 100%);
            padding: 2.5rem;
            text-align: center;
            color: var(--color-white);
            position: relative;
        }

        .profile-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: var(--color-white);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            box-shadow: var(--shadow-lg);
            border: 4px solid rgba(255, 255, 255, 0.3);
        }

        .profile-avatar svg {
            width: 60px;
            height: 60px;
            color: var(--color-primary);
        }

        .profile-name {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
        }

        .profile-role {
            font-size: 1rem;
            opacity: 0.9;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .admin-badge {
            display: inline-block;
            background: rgba(255, 255, 255, 0.2);
            padding: 0.25rem 0.75rem;
            border-radius: 50px;
            font-size: 0.75rem;
            margin-top: 0.5rem;
        }

        .profile-content {
            padding: 2rem;
        }

        .info-section {
            margin-bottom: 2rem;
        }

        .section-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--color-dark);
        }

        .section-title svg {
            width: 20px;
            height: 20px;
            color: var(--color-primary);
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1rem;
        }

        .info-item {
            background: var(--color-light);
            padding: 1rem;
            border-radius: var(--radius-lg);
        }

        .info-label {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--color-dark-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.35rem;
        }

        .info-value {
            font-size: 1rem;
            color: var(--color-dark);
            font-weight: 500;
        }

        /* Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }

        .stat-card {
            background: var(--color-light);
            padding: 1.25rem;
            border-radius: var(--radius-lg);
            text-align: center;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: 700;
            color: var(--color-primary);
        }

        .stat-label {
            font-size: 0.85rem;
            color: var(--color-dark-secondary);
        }

        /* Actions */
        .actions {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
            padding-top: 1.5rem;
            border-top: 1px solid var(--color-light-secondary);
        }

        /* Loading */
        .loading-message {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--color-dark-secondary);
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--color-light-secondary);
            border-top-color: var(--color-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .navbar {
                padding: 1rem;
            }

            .container {
                margin: 1rem auto;
                padding: 0 1rem;
            }

            .profile-header {
                padding: 2rem 1rem;
            }

            .profile-content {
                padding: 1.5rem;
            }

            .actions {
                flex-direction: column;
            }

            .btn {
                width: 100%;
                justify-content: center;
            }
        }

        /* Back link */
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
            color: var(--color-dark-secondary);
            font-weight: 500;
            transition: var(--transition);
        }

        .back-link:hover {
            color: var(--color-primary);
        }
    </style>
</head>
<body>

    <!-- Navigation -->
    <nav class="navbar">
        <a href="index.html" class="logo">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24" fill="white">
                    <path d="M12 2C8.68629 2 6 4.68629 6 8C6 12.5 12 22 12 22C12 22 18 12.5 18 8C18 4.68629 15.3137 2 12 2Z"/>
                </svg>
            </div>
            <span class="logo-text">CityFix</span>
        </a>
        
        <div class="nav-links">
            <a href="index.html" class="nav-link">Accueil</a>
            <a href="admin-dashboard.html" id="dashboardLink" class="nav-link">Tableau de bord</a>
            <a href="map-view.html" class="nav-link">Carte</a>
            <button id="logoutBtn" class="btn btn-secondary">Déconnexion</button>
        </div>
    </nav>

    <!-- Bouton retour -->
    <div class="container" style="padding-bottom: 0; padding-top: 1rem;">
        <a href="dashboard.html" class="back-link" id="backLink">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 12H5M12 19l-7-7 7-7"/>
            </svg>
            Retour au tableau de bord
        </a>
    </div>

    <!-- Main content -->
    <div class="container">
        <div class="profile-card">
            <div class="profile-header">
                <div class="profile-avatar">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 4a4 4 0 1 0 0 8 4 4 0 0 0 0-8ZM2 20a10 10 0 1 1 20 0H2Z"/>
                    </svg>
                </div>
                <h1 class="profile-name" id="userName">Chargement...</h1>
                <p class="profile-role" id="userRole">Utilisateur</p>
                <span class="admin-badge" id="adminBadge" style="display: none;">Administrateur</span>
            </div>
            
            <div class="profile-content">
                <!-- Informations -->
                <div class="info-section">
                    <h2 class="section-title">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                        Informations du compte
                    </h2>
                    <div class="info-grid">
                        <div class="info-item">
                            <div class="info-label">Prénom</div>
                            <div class="info-value" id="userPrenom">-</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">Nom</div>
                            <div class="info-value" id="userNom">-</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">Email</div>
                            <div class="info-value" id="userEmail">-</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">Rôle</div>
                            <div class="info-value" id="userRoleValue">-</div>
                        </div>
                    </div>
                </div>

                <!-- Statistiques -->
                <div class="info-section">
                    <h2 class="section-title">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M18 20V10M12 20V4M6 20v-6"/>
                        </svg>
                        Statistiques
                    </h2>
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-number" id="statTotal">0</div>
                            <div class="stat-label">Total signalements</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-number" id="statPending">0</div>
                            <div class="stat-label">En attente</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-number" id="statInProgress">0</div>
                            <div class="stat-label">En cours</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-number" id="statResolved">0</div>
                            <div class="stat-label">Résolus</div>
                        </div>
                    </div>
                </div>

                <!-- Actions -->
                <div class="actions">
                    <a href="admin-dashboard.html" class="btn btn-secondary">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M4 4h7V2H4a2 2 0 0 0-2 2v7h2V4Zm14-2h-7v2h7a2 2 0 0 1 2 2v7h2V4a2 2 0 0 0-2-2Z"/>
                        </svg>
                        Tableau de bord
                    </a>
                    <button id="logoutBtn2" class="btn btn-danger">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                            <polyline points="16,17 21,12 16,7"/>
                            <line x1="21" y1="12" x2="9" y2="12"/>
                        </svg>
                        Déconnexion
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // Vérification utilisateur
            const user = JSON.parse(localStorage.getItem('user'));
            if (!user || !user.id) {
                window.location.href = 'connexion.html';
                return;
            }

            const API_URL = '';

            // Afficher les informations utilisateur
            document.getElementById('userName').textContent = `${user.prenom || ''} ${user.nom || ''}`.trim() || 'Utilisateur';
            document.getElementById('userPrenom').textContent = user.prenom || '-';
            document.getElementById('userNom').textContent = user.nom || '-';
            document.getElementById('userEmail').textContent = user.email || '-';
            
            const roleText = user.role === 'ADMIN' ? 'Administrateur' : 'Utilisateur';
            document.getElementById('userRole').textContent = roleText;
            document.getElementById('userRoleValue').textContent = roleText;

            // Afficher le badge admin
            if (user.role === 'ADMIN') {
                document.getElementById('adminBadge').style.display = 'inline-block';
                document.getElementById('dashboardLink').href = 'admin-dashboard.html';
                document.getElementById('backLink').href = 'admin-dashboard.html';
            } else {
                document.getElementById('dashboardLink').href = 'dashboard.html';
                document.getElementById('backLink').href = 'dashboard.html';
            }

            // Récupérer les statistiques des signalements
            async function fetchStats() {
                try {
                    // Pour admin, récupérer tous les signalements
                    // Pour utilisateur normal, récupérer ses signalements
                    const endpoint = user.role === 'ADMIN' 
                        ? `${API_URL}/api/signalements`
                        : `${API_URL}/api/signalements/utilisateur/${user.id}`;
                    
                    const response = await fetch(endpoint);
                    if (!response.ok) throw new Error('Erreur serveur');
                    
                    const signalements = await response.json();
                    
                    // Calculer les statistiques
                    const total = signalements.length;
                    const pending = signalements.filter(s => s.statut === 'EN_ATTENTE').length;
                    const inProgress = signalements.filter(s => s.statut === 'EN_COURS').length;
                    const resolved = signalements.filter(s => s.statut === 'RESOLU').length;
                    
                    // Mettre à jour l'affichage
                    document.getElementById('statTotal').textContent = total;
                    document.getElementById('statPending').textContent = pending;
                    document.getElementById('statInProgress').textContent = inProgress;
                    document.getElementById('statResolved').textContent = resolved;
                    
                } catch (error) {
                    console.error('Erreur:', error);
                }
            }

            // Gestion de la déconnexion
            function handleLogout() {
                localStorage.removeItem('user');
                window.location.href = 'connexion.html';
            }

            document.getElementById('logoutBtn').addEventListener('click', handleLogout);
            document.getElementById('logoutBtn2').addEventListener('click', handleLogout);

            // Charger les statistiques
            fetchStats();
        });
    </script>
</body>
</html>
