<!DOCTYPE html>
<!-- 
    Page Créer un signalement - CityFix
    Description : Formulaire moderne pour créer un nouveau signalement avec sélection de localisation sur carte et upload de photo
-->
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Créer un signalement - CityFix</title>
    <meta name="description" content="Signalez un problème dans votre ville">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cpath fill='%233A86FF' d='M12 2C8.68629 2 6 4.68629 6 8C6 12.5 12 22 12 22C12 22 18 12.5 18 8C18 4.68629 15.3137 2 12 2Z'/%3E%3C/svg%3E">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap');

        :root {
            --color-primary: #3A86FF;
            --color-primary-dark: #2563eb;
            --color-primary-light: #60a5fa;
            --color-success: #06D6A0;
            --color-warning: #FFA500;
            --color-danger: #FF4D4D;
            --color-white: #FFFFFF;
            --color-dark: #1e293b;
            --color-dark-secondary: #475569;
            --color-light: #f8fafc;
            --color-light-secondary: #e2e8f0;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.1);
            --radius-sm: 0.375rem;
            --radius-md: 0.5rem;
            --radius-lg: 0.75rem;
            --radius-xl: 1rem;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', 'Inter', sans-serif;
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
            color: var(--color-dark);
            min-height: 100vh;
            line-height: 1.6;
        }

        /* Navigation */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow-sm);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-light) 100%);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-icon svg {
            width: 20px;
            height: 20px;
        }

        .logo-text {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--color-primary);
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
            color: var(--color-dark-secondary);
            font-weight: 500;
            transition: var(--transition);
        }

        .back-link:hover {
            color: var(--color-primary);
        }

        /* Main container */
        .container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }

        .page-header {
            margin-bottom: 2rem;
        }

        .page-header h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .page-header p {
            color: var(--color-dark-secondary);
        }

        /* Form card */
        .form-card {
            background: var(--color-white);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-lg);
            padding: 2rem;
            animation: fadeInUp 0.5s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-section {
            margin-bottom: 2rem;
        }

        .section-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--color-dark);
        }

        .section-title svg {
            width: 20px;
            height: 20px;
            color: var(--color-primary);
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group:last-child {
            margin-bottom: 0;
        }

        .form-group label {
            display: block;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: var(--color-dark);
            font-size: 0.9rem;
        }

        .form-group input[type="text"],
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 0.875rem 1rem;
            border: 2px solid var(--color-light-secondary);
            border-radius: var(--radius-lg);
            font-size: 1rem;
            font-family: inherit;
            transition: var(--transition);
            background: var(--color-light);
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--color-primary);
            background: var(--color-white);
            box-shadow: 0 0 0 3px rgba(58, 134, 255, 0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 120px;
        }

        /* Map */
        .map-wrapper {
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-md);
        }

        .map-container {
            height: 300px;
        }

        #map {
            height: 100%;
            width: 100%;
        }

        .map-hint {
            padding: 0.75rem 1rem;
            background: var(--color-light);
            border-top: 1px solid var(--color-light-secondary);
            font-size: 0.85rem;
            color: var(--color-dark-secondary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .map-hint svg {
            width: 16px;
            height: 16px;
            color: var(--color-primary);
        }

        .status-message {
            margin-top: 0.75rem;
            padding: 0.75rem 1rem;
            border-radius: var(--radius-md);
            font-size: 0.85rem;
            display: none;
        }

        .status-message.success {
            display: block;
            background: rgba(6, 214, 160, 0.1);
            color: #059669;
        }

        .status-message.error {
            display: block;
            background: rgba(255, 77, 77, 0.1);
            color: #dc2626;
        }

        /* File upload */
        .file-upload {
            position: relative;
            border: 2px dashed var(--color-light-secondary);
            border-radius: var(--radius-lg);
            padding: 2rem;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
            background: var(--color-light);
        }

        .file-upload:hover {
            border-color: var(--color-primary);
            background: rgba(58, 134, 255, 0.05);
        }

        .file-upload input[type="file"] {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        .file-upload-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.75rem;
            pointer-events: none;
        }

        .file-upload-icon {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(58, 134, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--color-primary);
        }

        .file-upload-icon svg {
            width: 24px;
            height: 24px;
        }

        .file-upload-text {
            font-weight: 500;
            color: var(--color-dark);
        }

        .file-upload-hint {
            font-size: 0.85rem;
            color: var(--color-dark-secondary);
        }

        .file-preview {
            display: none;
            margin-top: 1rem;
            padding: 1rem;
            background: var(--color-light);
            border-radius: var(--radius-md);
            align-items: center;
            gap: 1rem;
        }

        .file-preview.show {
            display: flex;
        }

        .file-preview img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: var(--radius-md);
        }

        .file-preview-info {
            flex: 1;
        }

        .file-preview-name {
            font-weight: 500;
            font-size: 0.9rem;
        }

        .file-preview-size {
            font-size: 0.8rem;
            color: var(--color-dark-secondary);
        }

        /* Submit button */
        .form-actions {
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--color-light-secondary);
        }

        .btn-submit {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-dark) 100%);
            color: var(--color-white);
            border: none;
            border-radius: var(--radius-lg);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            box-shadow: 0 4px 14px 0 rgba(58, 134, 255, 0.3);
        }

        .btn-submit:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(58, 134, 255, 0.4);
        }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .error-message {
            background: rgba(255, 77, 77, 0.1);
            color: #dc2626;
            padding: 0.75rem 1rem;
            border-radius: var(--radius-md);
            font-size: 0.875rem;
            margin-top: 1rem;
            display: none;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .navbar {
                padding: 1rem;
            }

            .container {
                margin: 1rem auto;
                padding: 0 1rem;
            }

            .form-card {
                padding: 1.5rem;
            }

            .page-header h1 {
                font-size: 1.5rem;
            }
        }
    </style>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
</head>
<body>

    <!-- Navigation -->
    <nav class="navbar">
        <a href="index.html" class="logo">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24" fill="white">
                    <path d="M12 2C8.68629 2 6 4.68629 6 8C6 12.5 12 22 12 22C12 22 18 12.5 18 8C18 4.68629 15.3137 2 12 2Z"/>
                </svg>
            </div>
            <span class="logo-text">CityFix</span>
        </a>
        
        <a href="dashboard.html" class="back-link">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 12H5M12 19l-7-7 7-7"/>
            </svg>
            Retour
        </a>
    </nav>

    <!-- Main content -->
    <div class="container">
        <div class="page-header">
            <h1>Créer un signalement</h1>
            <p>Signalez un problème dans votre quartier pour aider à l'améliorer</p>
        </div>

        <div class="form-card">
            <form id="signalementForm" enctype="multipart/form-data">
                
                <!-- Informations -->
                <div class="form-section">
                    <h3 class="section-title">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"/>
                            <path d="M12 16v-4M12 8h.01"/>
                        </svg>
                        Informations
                    </h3>
                    
                    <div class="form-group">
                        <label for="titre">Titre du signalement</label>
                        <input type="text" id="titre" name="titre" placeholder="Ex: Nid de poule dangereux" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="description">Description</label>
                        <textarea id="description" name="description" placeholder="Décrivez le problème en détail..."></textarea>
                    </div>
                    
                    <div class="form-group">
                        <label for="typeSignalement">Type de problème</label>
                        <select id="typeSignalement" name="typeSignalement" required>
                            <option value="" disabled selected>Sélectionnez un type</option>
                            <option value="Voirie">Voirie (nids de poule, routes endommagées...)</option>
                            <option value="Dechets">Déchets (déposants illégaux, containers pleine...)</option>
                            <option value="Eclairage">Éclairage (lampadaires HS, éclairage deficient...)</option>
                            <option value="NidDePoule">Nid de poule</option>
                            <option value="Securite_et_ordre_public">Sécurité et ordre public</option>
                            <option value="Eau">Eau (fuites, inondations...)</option>
                            <option value="Poteau_encombrant">Poteau encombrant</option>
                            <option value="Desordre_urbain">Désordre urbain</option>
                        </select>
                    </div>
                </div>

                <!-- Localisation -->
                <div class="form-section">
                    <h3 class="section-title">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
                            <circle cx="12" cy="10" r="3"/>
                        </svg>
                        Localisation
                    </h3>
                    
                    <div class="map-wrapper">
                        <div class="map-container">
                            <div id="map"></div>
                        </div>
                        <div class="map-hint">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M3 12a9 9 0 1 0 18 0a9 9 0 0 0 -18 0"/>
                                <path d="M12 9v.01M12 12v4"/>
                            </svg>
                            Cliquez sur la carte pour sélectionner l'emplacement
                        </div>
                    </div>
                    <div id="coordsDisplay" class="status-message">Veuillez sélectionner une localisation sur la carte.</div>
                </div>

                <!-- Photo -->
                <div class="form-section">
                    <h3 class="section-title">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                            <circle cx="8.5" cy="8.5" r="1.5"/>
                            <path d="M21 15l-5-5L5 21"/>
                        </svg>
                        Photo
                    </h3>
                    
                    <div class="file-upload">
                        <input type="file" id="photo" name="photo" accept="image/*" required>
                        <div class="file-upload-content">
                            <div class="file-upload-icon">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                                    <polyline points="17,8 12,3 7,8"/>
                                    <line x1="12" y1="3" x2="12" y2="15"/>
                                </svg>
                            </div>
                            <span class="file-upload-text">Cliquez ou glissez une photo</span>
                            <span class="file-upload-hint">PNG, JPG jusqu'à 10MB</span>
                        </div>
                    </div>
                    <div id="filePreview" class="file-preview">
                        <img id="previewImage" src="" alt="Aperçu">
                        <div class="file-preview-info">
                            <div id="fileName" class="file-preview-name"></div>
                            <div id="fileSize" class="file-preview-size"></div>
                        </div>
                    </div>
                </div>

                <!-- Submit -->
                <div class="form-actions">
                    <button type="submit" class="btn-submit" id="submitBtn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
                        </svg>
                        Soumettre le signalement
                    </button>
                    <p class="error-message" id="errorMessage"></p>
                </div>
            </form>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {

            // Vérification utilisateur
            const user = JSON.parse(localStorage.getItem('user'));
            if (!user || !user.id) {
                window.location.href = 'connexion.html';
                return;
            }

            // Variables
            const form = document.getElementById('signalementForm');
            const errorMessage = document.getElementById('errorMessage');
            const coordsDisplay = document.getElementById('coordsDisplay');
            const submitBtn = document.getElementById('submitBtn');
            const API_URL = '';
            
            let locationId = null;

            // Map
            const map = L.map('map').setView([3.848, 11.502], 13);

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap'
            }).addTo(map);

            let marker;

            // Click sur la carte
            map.on('click', async (e) => {
                const { lat, lng } = e.latlng;
                coordsDisplay.textContent = 'Enregistrement de la localisation...';
                coordsDisplay.className = 'status-message';
                
                if (marker) map.removeLayer(marker);
                marker = L.marker([lat, lng]).addTo(map);

                try {
                    const locationData = { lattitude: lat, longitude: lng };
                    const response = await fetch(`${API_URL}/creer`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(locationData)
                    });
                    
                    if (!response.ok) throw new Error('Erreur');
                    
                    const newLocation = await response.json();
                    locationId = newLocation.id;
                    
                    coordsDisplay.textContent = `✓ Localisation enregistrée !`;
                    coordsDisplay.className = 'status-message success';
                    errorMessage.style.display = 'none';

                } catch (error) {
                    console.error(error);
                    coordsDisplay.textContent = 'Erreur lors de l\'enregistrement.';
                    coordsDisplay.className = 'status-message error';
                    map.removeLayer(marker);
                    locationId = null;
                }
            });

            // File preview
            const photoInput = document.getElementById('photo');
            const filePreview = document.getElementById('filePreview');
            const previewImage = document.getElementById('previewImage');
            const fileName = document.getElementById('fileName');
            const fileSize = document.getElementById('fileSize');

            photoInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        previewImage.src = e.target.result;
                        fileName.textContent = file.name;
                        fileSize.textContent = (file.size / 1024 / 1024).toFixed(2) + ' MB';
                        filePreview.classList.add('show');
                    };
                    reader.readAsDataURL(file);
                }
            });

            // Submit
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                if (!locationId) {
                    errorMessage.textContent = 'Veuillez sélectionner une localisation sur la carte.';
                    errorMessage.style.display = 'block';
                    return;
                }

                submitBtn.disabled = true;
                submitBtn.innerHTML = '<span>Envoi en cours...</span>';

                const formData = new FormData(form);
                formData.append('statut', 'EN_ATTENTE');
                formData.append('utilisateurId', user.id);
                formData.append('localisationId', locationId);

                try {
                    const response = await fetch(`${API_URL}/api/signalements/ajouter`, {
                        method: 'POST',
                        body: formData
                    });

                    if (response.ok) {
                        alert('Signalement soumis avec succès !');
                        window.location.href = 'dashboard.html';
                    } else {
                        const errorText = await response.text();
                        errorMessage.textContent = errorText || 'Erreur lors de la soumission.';
                        errorMessage.style.display = 'block';
                        submitBtn.disabled = false;
                        submitBtn.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg> Soumettre le signalement';
                    }
                } catch (error) {
                    console.error(error);
                    errorMessage.textContent = 'Erreur de connexion. Veuillez réessayer.';
                    errorMessage.style.display = 'block';
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg> Soumettre le signalement';
                }
            });
        });
    </script>
</body>
</html>
